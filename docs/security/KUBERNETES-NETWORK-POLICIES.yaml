    app.kubernetes.io/part-of: eventxgames
    security.eventxgames.com/policy-type: infrastructure
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow all traffic from kube-system namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
